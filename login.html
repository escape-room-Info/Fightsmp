<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FightSMP | Login</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #05070c;          
            --card-bg: rgba(17, 24, 39, 0.7); 
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-orange: #f97316;
            --accent-blue: #3b82f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            background-image: linear-gradient(rgba(5, 7, 12, 0.85), rgba(5, 7, 12, 0.95)), url('https://images.unsplash.com/photo-1605379399642-870262d3d051?q=80&w=2000&auto=format&fit=crop');
            background-size: cover; background-position: center;
            color: var(--text-main); font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .login-container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .logo { font-family: 'Rajdhani', sans-serif; font-size: 32px; font-weight: 700; text-decoration: none; color: #fff; margin-bottom: 30px; display: inline-block; }
        .logo i { color: var(--accent-orange); margin-right: 5px; }

        /* TAB SYSTEM */
        .tabs { display: flex; background: rgba(0,0,0,0.3); border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; color: var(--text-muted); font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--accent-orange); color: #fff; }
        
        .form-section { display: none; text-align: left; animation: fadeIn 0.3s ease; }
        .form-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group input { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 8px; color: #fff; font-size: 15px; outline: none; transition: 0.2s; }
        .input-group input:focus { border-color: var(--accent-orange); box-shadow: 0 0 10px rgba(249,115,22,0.2); }

        .submit-btn { width: 100%; background: var(--accent-orange); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; box-shadow: 0 0 15px rgba(249,115,22,0.3); }
        .submit-btn:hover { background: #ca3e10; transform: translateY(-2px); }
        
        .back-link { display: inline-block; margin-top: 25px; color: var(--text-muted); text-decoration: none; font-size: 14px; transition: 0.2s; }
        .back-link:hover { color: #fff; }

        .info-box { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); padding: 12px; border-radius: 8px; font-size: 13px; color: #93c5fd; margin-bottom: 20px; line-height: 1.5; text-align: left; }
    </style>
</head>
<body>

    <div class="login-container">
        <a href="index.html" class="logo"><i class="fa-solid fa-shield-halved"></i> Fight<span style="color: var(--accent-blue);">SMP</span></a>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('player')">Spieler</button>
            <button class="tab-btn" onclick="switchTab('team')">Team</button>
        </div>

        <div id="player-tab" class="form-section active">
            <div class="info-box">
                <i class="fa-solid fa-circle-info"></i> Gebe Ingame auf dem Server <strong>/link</strong> ein, um deinen persönlichen Login-Code zu erhalten!
            </div>
            <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
                <div class="input-group">
                    <label>Minecraft Name</label>
                    <input type="text" placeholder="Z.B. Notch" required>
                </div>
                <div class="input-group">
                    <label>Login Code</label>
                    <input type="text" placeholder="XXXX-XXXX" required>
                </div>
                <button type="submit" class="submit-btn"><i class="fa-solid fa-link"></i> Account Verknüpfen</button>
            </form>
        </div>

        <div id="team-tab" class="form-section">
            <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
                <div class="input-group">
                    <label>Benutzername</label>
                    <input type="text" placeholder="Admin/Mod Name" required>
                </div>
                <div class="input-group">
                    <label>Passwort</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="submit-btn"><i class="fa-solid fa-right-to-bracket"></i> Einloggen</button>
            </form>
        </div>

        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Zurück zur Website</a>
    </div>

    <script>
        function switchTab(tab) {
            // Buttons anpassen
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Formulare anpassen
            document.querySelectorAll('.form-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
        }
    </script>
</body>
</html>
