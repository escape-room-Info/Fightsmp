<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FightSMP | News</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --bg-color: #05070c; --card-bg: rgba(17, 24, 39, 0.6); --text-main: #f3f4f6; --text-muted: #9ca3af; --accent-orange: #f97316; --accent-blue: #3b82f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); background-image: linear-gradient(rgba(5, 7, 12, 0.9), rgba(5, 7, 12, 0.95)), url('https://images.unsplash.com/photo-1605379399642-870262d3d051?q=80&w=2000&auto=format&fit=crop'); background-attachment: fixed; background-size: cover; color: var(--text-main); font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Rajdhani', sans-serif; font-weight: 700; }
        
        .navbar { background: rgba(10, 15, 25, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 15px 0; position: sticky; top: 0; z-index: 1000; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .nav-logo { display: flex; align-items: center; text-decoration: none; color: #fff; font-size: 26px; }
        .text-orange { color: var(--accent-orange); margin-right: 5px; } .text-blue { color: var(--accent-blue); }
        .nav-right-group { display: flex; align-items: center; gap: 15px; }
        .nav-menu { display: flex; gap: 20px; align-items: center; }
        .nav-link { color: var(--text-muted); text-decoration: none; font-weight: 500; font-size: 16px; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { color: #fff; }
        .nav-link.active { border-bottom: 2px solid var(--accent-orange); padding-bottom: 4px; }
        
        .server-status { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; background: rgba(0, 0, 0, 0.3); padding: 8px 14px; border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .status-dot { width: 8px; height: 8px; background-color: #10b981; border-radius: 50%; }
        
        .ip-btn { background: #e04f1a; color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .login-btn { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.2); padding: 10px 15px; border-radius: 6px; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .mobile-menu-btn { display: none; background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

        .container { max-width: 1200px; margin: 0 auto 60px auto; padding: 0 20px; }
        .header-section { text-align: center; margin: 60px 0 40px 0; }
        .header-section h1 { font-size: 48px; }
        
        .news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .news-card { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; overflow: hidden; }
        .news-image { height: 180px; background: #1e293b; background-size: cover; position: relative; }
        .news-content { padding: 25px; }
        .news-date { color: var(--text-muted); font-size: 13px; margin-bottom: 10px; }
        .news-title { font-size: 24px; color: #fff; margin-bottom: 15px;}
        .news-excerpt { color: #d1d5db; line-height: 1.6; }

        @media (max-width: 900px) { .mobile-menu-btn { display: block; } .nav-menu { position: fixed; top: 70px; left: -100%; width: 100%; height: calc(100vh - 70px); background: rgba(5, 7, 12, 0.98); flex-direction: column; justify-content: center; } .nav-menu.active { left: 0; } .server-status, .ip-btn, .login-btn { display: none; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo"><i class="fa-solid fa-shield-halved text-orange"></i> Fight<span class="text-blue">SMP</span></a>
            <div class="nav-right-group">
                <div class="nav-menu" id="navMenu">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="news.html" class="nav-link active">News</a>
                    <a href="shop.html" class="nav-link">Shop</a>
                    <a href="team.html" class="nav-link">Team</a>
                    <a href="rules.html" class="nav-link">Regelwerk</a>
                    <a href="faq.html" class="nav-link">FAQ</a>
                </div>
                <div class="server-status"><span class="status-dot pulse" id="status-indicator"></span><span id="player-count-num" style="color:#10b981;">...</span></div>
                <button class="ip-btn" onclick="copyServerIP()"><i class="fa-solid fa-copy"></i> play.fightsmp.net</button>
                <a href="login.html" class="login-btn"><i class="fa-solid fa-user"></i> Login</a>
                <button class="mobile-menu-btn" onclick="toggleMobileMenu()"><i class="fa-solid fa-bars" id="menu-icon"></i></button>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <div class="header-section" data-aos="fade-down">
            <h1>Aktuelle <span style="color: var(--accent-orange);">Neuigkeiten</span></h1>
        </div>
        <div class="news-grid">
            <div class="news-card" data-aos="fade-up">
                <div class="news-image" style="background-image: url('https://images.unsplash.com/photo-1628155930542-3c7a64e2c833?q=80&w=1000');"></div>
                <div class="news-content">
                    <div class="news-date"><i class="fa-regular fa-calendar"></i> 26. Juni 2026</div>
                    <h3 class="news-title">Season 2 ist online!</h3>
                    <p class="news-excerpt">Die neue Season hat begonnen. Neue Map, neue Dungeons!</p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, offset: 50 });
        function toggleMobileMenu() { const m = document.getElementById('navMenu'), i = document.getElementById('menu-icon'); m.classList.toggle('active'); i.className = m.classList.contains('active') ? 'fa-solid fa-xmark' : 'fa-solid fa-bars'; }
        function copyServerIP() { navigator.clipboard.writeText("play.fightsmp.net").then(() => alert("IP kopiert!")); }
        async function fetchPlayerCount() { try { const res = await fetch('https://api.mcsrvstat.us/3/play.fightsmp.net'); const data = await res.json(); document.getElementById('player-count-num').innerText = data.online ? data.players.online : 'Offline'; } catch(e) {} } fetchPlayerCount();
    </script>
</body>
</html>
